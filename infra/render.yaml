services:
  - type: web
    name: wholesale-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false

  - type: web
    name: wholesale-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wholesale-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wholesale-key-value
          property: connectionString
      - key: API_CORS_ORIGINS
        sync: false

  - type: worker
    name: wholesale-worker
    runtime: python
    rootDir: apps/worker
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python -m worker.main
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wholesale-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: wholesale-key-value
          property: connectionString

databases:
  - name: wholesale-postgres
    plan: basic-256mb

keyValue:
  - name: wholesale-key-value
    plan: starter
    ipAllowList: []
