services:
  - type: web
    name: oakwell-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm ci --workspaces=false && npm run build
    startCommand: npm run start
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        value: /os
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        value: /os

  - type: web
    name: oakwell-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run alembic upgrade head && uv run python -m app.cli.bootstrap_from_env && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: oakwell-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: oakwell-key-value
          property: connectionString
      - key: API_CORS_ORIGINS
        sync: false
      - key: DEFAULT_ORGANIZATION_NAME
        value: Stonegate Home Buyers
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: Owner
      - key: SPEED_TO_LEAD_DUE_MINUTES
        value: 5
      - key: LEAD_MANAGER_HANDOFF_SLA_MINUTES
        value: 60
      - key: COMMUNICATION_PROVIDER_MODE
        value: live
      - key: WORKER_READINESS_REQUIRED
        value: true
      - key: WORKER_STALE_AFTER_SECONDS
        value: 120
      - key: AI_ENABLED
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-5.6-sol
      - key: OPENAI_HIGH_VOLUME_MODEL
        value: ""
      - key: OPENAI_ESCALATION_MODEL
        value: ""
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: OPENAI_WEB_SEARCH_ENABLED
        value: false
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: 30
      - key: OPENAI_PRICING_OVERRIDES_JSON
        value: ""
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe-diarize
      - key: CALL_TRANSCRIPTION_ENABLED
        value: true
      - key: CALL_TRANSCRIPTION_POLL_SECONDS
        value: 10
      - key: CALL_TRANSCRIPTION_MAX_ATTEMPTS
        value: 3
      - key: CALL_RECORDING_RETENTION_DAYS
        value: 180
      - key: EMAIL_ENABLED
        value: false
      - key: EMAIL_SYNC_ENABLED
        value: false
      - key: EMAIL_SYNC_POLL_SECONDS
        value: 30
      - key: EMAIL_MAX_ATTACHMENT_BYTES
        value: 10000000
      - key: EMAIL_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: EMAIL_OAUTH_STATE_SECRET
        sync: false
      - key: EMAIL_WEB_APP_BASE_URL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: PROPERTY_DATA_PROVIDER
        value: rentcast
      - key: ATTOM_API_KEY
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: RENTCAST_BASE_URL
        value: https://api.rentcast.io/v1
      - key: BRIDGE_API_BASE_URL
        sync: false
      - key: BRIDGE_API_KEY
        sync: false
      - key: TWILIO_SMS_ENABLED
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_SMS_FROM_NUMBER
        sync: false
      - key: TWILIO_WEBHOOK_BASE_URL
        sync: false
      - key: TWILIO_VALIDATE_WEBHOOK_SIGNATURES
        value: true
      - key: TWILIO_SMS_TIMEZONE
        value: America/New_York
      - key: TWILIO_SMS_ALLOWED_START_HOUR
        value: 0
      - key: TWILIO_SMS_ALLOWED_END_HOUR
        value: 24
      - key: TWILIO_VOICE_ENABLED
        sync: false
      - key: TWILIO_VOICE_FROM_NUMBER
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_VOICE_TOKEN_TTL_SECONDS
        value: 3600
      - key: TWILIO_VOICE_RING_TIMEOUT_SECONDS
        value: 25
      - key: TWILIO_VOICE_TIMEZONE
        value: America/New_York
      - key: TWILIO_VOICE_ALLOWED_START_HOUR
        value: 9
      - key: TWILIO_VOICE_ALLOWED_END_HOUR
        value: 20
      - key: TWILIO_VOICE_RECORDING_ENABLED
        sync: false
      - key: TWILIO_VOICE_RECORDING_DISCLOSURE
        sync: false
      - key: UNDERWRITING_OFFER_LOW_PERCENTAGE
        value: 0.65
      - key: UNDERWRITING_OFFER_HIGH_PERCENTAGE
        value: 0.70
      - key: UNDERWRITING_DEFAULT_ASSIGNMENT_FEE_CENTS
        value: 1500000
      - key: UNDERWRITING_TRANSACTION_RESERVE_CENTS
        value: 250000
      - key: UNDERWRITING_PURCHASE_COST_PERCENTAGE
        value: 0.02
      - key: UNDERWRITING_FINANCING_HOLDING_PERCENTAGE
        value: 0.06
      - key: UNDERWRITING_RESALE_COST_PERCENTAGE
        value: 0.08
      - key: UNDERWRITING_NEGOTIATION_RESERVE_PERCENTAGE
        value: 0.08
      - key: UNDERWRITING_RENTAL_TARGET_CAP_RATE
        value: 0.08
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  - type: worker
    name: oakwell-worker
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python -m app.worker
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: oakwell-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: oakwell-key-value
          property: connectionString
      - key: COMMUNICATION_PROVIDER_MODE
        value: live
      - key: WORKER_HEARTBEAT_INTERVAL_SECONDS
        value: 30
      - key: WORKER_STALE_AFTER_SECONDS
        value: 120
      - key: WORKER_RETRY_BASE_SECONDS
        value: 15
      - key: WORKER_RETRY_MAX_SECONDS
        value: 900
      - key: OPERATIONS_ALERT_WEBHOOK_URL
        sync: false
      - key: OPERATIONS_ALERT_AFTER_FAILURES
        value: 3
      - key: AI_ENABLED
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-5.6-sol
      - key: OPENAI_HIGH_VOLUME_MODEL
        value: ""
      - key: OPENAI_ESCALATION_MODEL
        value: ""
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: 30
      - key: OPENAI_PRICING_OVERRIDES_JSON
        value: ""
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe-diarize
      - key: CALL_TRANSCRIPTION_ENABLED
        value: true
      - key: CALL_TRANSCRIPTION_POLL_SECONDS
        value: 10
      - key: CALL_TRANSCRIPTION_MAX_ATTEMPTS
        value: 3
      - key: CALL_RECORDING_RETENTION_DAYS
        value: 180
      - key: EMAIL_ENABLED
        value: false
      - key: EMAIL_SYNC_ENABLED
        value: false
      - key: EMAIL_SYNC_POLL_SECONDS
        value: 30
      - key: EMAIL_MAX_ATTACHMENT_BYTES
        value: 10000000
      - key: EMAIL_TOKEN_ENCRYPTION_KEY
        sync: false
      - key: EMAIL_OAUTH_STATE_SECRET
        sync: false
      - key: EMAIL_WEB_APP_BASE_URL
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false

  - type: keyvalue
    name: oakwell-key-value
    plan: starter
    ipAllowList: []

databases:
  - name: oakwell-postgres
    plan: basic-256mb
