services:
  - type: web
    name: oakwell-web
    runtime: node
    rootDir: apps/web
    buildCommand: npm ci --workspaces=false && npm run build
    startCommand: npm run start
    envVars:
      - key: API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        value: /os
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        value: /os

  - type: web
    name: oakwell-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run alembic upgrade head && uv run python -m app.cli.bootstrap_from_env && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: oakwell-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: oakwell-key-value
          property: connectionString
      - key: API_CORS_ORIGINS
        sync: false
      - key: DEFAULT_ORGANIZATION_NAME
        value: Stonegate Home Buyers
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: Owner
      - key: SPEED_TO_LEAD_DUE_MINUTES
        value: 5
      - key: AI_ENABLED
        value: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_DEFAULT_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: OPENAI_WEB_SEARCH_ENABLED
        value: false
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: 30
      - key: PROPERTY_DATA_PROVIDER
        value: rentcast
      - key: ATTOM_API_KEY
        sync: false
      - key: RENTCAST_API_KEY
        sync: false
      - key: RENTCAST_BASE_URL
        value: https://api.rentcast.io/v1
      - key: BRIDGE_API_BASE_URL
        sync: false
      - key: BRIDGE_API_KEY
        sync: false
      - key: TWILIO_SMS_ENABLED
        value: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_WEBHOOK_BASE_URL
        sync: false
      - key: TWILIO_VALIDATE_WEBHOOK_SIGNATURES
        value: true
      - key: TWILIO_SMS_TIMEZONE
        value: America/New_York
      - key: TWILIO_SMS_ALLOWED_START_HOUR
        value: 9
      - key: TWILIO_SMS_ALLOWED_END_HOUR
        value: 20
      - key: UNDERWRITING_OFFER_LOW_PERCENTAGE
        value: 0.65
      - key: UNDERWRITING_OFFER_HIGH_PERCENTAGE
        value: 0.70
      - key: UNDERWRITING_DEFAULT_ASSIGNMENT_FEE_CENTS
        value: 1500000
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_AUDIENCE
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false

  - type: worker
    name: oakwell-worker
    runtime: python
    rootDir: apps/worker
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python -m worker.main
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: oakwell-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: oakwell-key-value
          property: connectionString

  - type: keyvalue
    name: oakwell-key-value
    plan: starter
    ipAllowList: []

databases:
  - name: oakwell-postgres
    plan: basic-256mb
